<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carbon Footprint Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Carbon Footprint Calculator</h1>
<p>Estimate your annual carbon footprint based on electricity, transport and flights.</p>

<div class="calculator">

    <label>Electricity Usage (kWh per month)</label>
    <input type="number" id="electricity" placeholder="e.g. 200">

    <label>Transport Type</label>
    <select id="transport">
        <option value="car">Car</option>
        <option value="bus">Bus</option>
        <option value="bike">Bike</option>
        <option value="walk">Walk</option>
    </select>

    <label>Flights per Year</label>
    <input type="number" id="flights" placeholder="e.g. 2">

    <button id="calculate">Calculate</button>

</div>

<p id="result"></p>

<script src="script.js"></script>

</body>
</html>
